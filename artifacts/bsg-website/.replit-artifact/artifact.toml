kind = "web"
previewPath = "/"
title = "Born to Serve Group"
version = "1.0.0"
id = "artifacts/bsg-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25989

[services.development]
run = "pnpm --filter @workspace/bsg-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bsg-website", "run", "build" ]
publicDir = "artifacts/bsg-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25989"
BASE_PATH = "/"
